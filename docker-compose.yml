x-worker-env: &worker-env
  <<: *runtime-env
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: enterprise_agent
      POSTGRES_USER: enterprise_agent
      POSTGRES_PASSWORD: enterprise_agent
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enterprise_agent -d enterprise_agent"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  agent-test-mysql:
    profiles: ["agent-test-data"]
    image: ${AGENT_TEST_MYSQL_IMAGE:-mysql:8.4}
    environment:
      MYSQL_ROOT_PASSWORD: ${AGENT_TEST_MYSQL_ROOT_PASSWORD:-AgentTest_mysql_root_2026}
      MYSQL_DATABASE: ${AGENT_TEST_MYSQL_DATABASE:-agent_test}
    ports:
      - "${AGENT_TEST_MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - agent-test-mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  agent-test-sqlserver:
    profiles: ["agent-test-data"]
    image: ${AGENT_TEST_SQLSERVER_IMAGE:-mcr.microsoft.com/mssql/server:2022-latest}
    platform: ${AGENT_TEST_SQLSERVER_PLATFORM:-linux/amd64}
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${AGENT_TEST_SQLSERVER_SA_PASSWORD:-AgentTest_sqlserver_sa_2026!}
    ports:
      - "${AGENT_TEST_SQLSERVER_HOST_PORT:-14330}:1433"
    volumes:
      - agent-test-sqlserver-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -C -S 127.0.0.1 -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -b -o /dev/null",
        ]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 60s

  agent-test-redis-mysql:
    profiles: ["agent-test-data"]
    image: ${AGENT_TEST_REDIS_IMAGE:-redis:7.4}
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${AGENT_TEST_REDIS_MYSQL_ADMIN_PASSWORD:-agent_test_redis_mysql_admin}",
      ]
    environment:
      AGENT_TEST_REDIS_MYSQL_ADMIN_PASSWORD: ${AGENT_TEST_REDIS_MYSQL_ADMIN_PASSWORD:-agent_test_redis_mysql_admin}
    ports:
      - "${AGENT_TEST_REDIS_MYSQL_HOST_PORT:-6381}:6379"
    volumes:
      - agent-test-redis-mysql-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a \"$$AGENT_TEST_REDIS_MYSQL_ADMIN_PASSWORD\" ping | grep PONG",
        ]
      interval: 5s
      timeout: 3s
      retries: 30

  agent-test-redis-sqlserver:
    profiles: ["agent-test-data"]
    image: ${AGENT_TEST_REDIS_IMAGE:-redis:7.4}
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${AGENT_TEST_REDIS_SQLSERVER_ADMIN_PASSWORD:-agent_test_redis_sqlserver_admin}",
      ]
    environment:
      AGENT_TEST_REDIS_SQLSERVER_ADMIN_PASSWORD: ${AGENT_TEST_REDIS_SQLSERVER_ADMIN_PASSWORD:-agent_test_redis_sqlserver_admin}
    ports:
      - "${AGENT_TEST_REDIS_SQLSERVER_HOST_PORT:-6382}:6379"
    volumes:
      - agent-test-redis-sqlserver-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a \"$$AGENT_TEST_REDIS_SQLSERVER_ADMIN_PASSWORD\" ping | grep PONG",
        ]
      interval: 5s
      timeout: 3s
      retries: 30

  agent-test-data-seeder:
    profiles: ["agent-test-data"]
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: agent-test-data-seeder
    command: ["python", "-m", "app.agent_test_data.seeder", "seed"]
    environment:
      AGENT_TEST_MYSQL_HOST: agent-test-mysql
      AGENT_TEST_MYSQL_PORT: 3306
      AGENT_TEST_MYSQL_DATABASE: ${AGENT_TEST_MYSQL_DATABASE:-agent_test}
      AGENT_TEST_MYSQL_ROOT_PASSWORD: ${AGENT_TEST_MYSQL_ROOT_PASSWORD:-AgentTest_mysql_root_2026}
      AGENT_TEST_SQLSERVER_HOST: agent-test-sqlserver
      AGENT_TEST_SQLSERVER_PORT: 1433
      AGENT_TEST_SQLSERVER_DATABASE: ${AGENT_TEST_SQLSERVER_DATABASE:-agent_test}
      AGENT_TEST_SQLSERVER_SA_PASSWORD: ${AGENT_TEST_SQLSERVER_SA_PASSWORD:-AgentTest_sqlserver_sa_2026!}
      AGENT_TEST_REDIS_MYSQL_HOST: agent-test-redis-mysql
      AGENT_TEST_REDIS_MYSQL_PORT: 6379
      AGENT_TEST_REDIS_MYSQL_ADMIN_PASSWORD: ${AGENT_TEST_REDIS_MYSQL_ADMIN_PASSWORD:-agent_test_redis_mysql_admin}
      AGENT_TEST_REDIS_MYSQL_SEEDER_USER: ${AGENT_TEST_REDIS_MYSQL_SEEDER_USER:-agent_test_seeder}
      AGENT_TEST_REDIS_MYSQL_SEEDER_PASSWORD: ${AGENT_TEST_REDIS_MYSQL_SEEDER_PASSWORD:-agent_test_seeder_redis_mysql}
      AGENT_TEST_REDIS_SQLSERVER_HOST: agent-test-redis-sqlserver
      AGENT_TEST_REDIS_SQLSERVER_PORT: 6379
      AGENT_TEST_REDIS_SQLSERVER_ADMIN_PASSWORD: ${AGENT_TEST_REDIS_SQLSERVER_ADMIN_PASSWORD:-agent_test_redis_sqlserver_admin}
      AGENT_TEST_REDIS_SQLSERVER_SEEDER_USER: ${AGENT_TEST_REDIS_SQLSERVER_SEEDER_USER:-agent_test_seeder}
      AGENT_TEST_REDIS_SQLSERVER_SEEDER_PASSWORD: ${AGENT_TEST_REDIS_SQLSERVER_SEEDER_PASSWORD:-agent_test_seeder_redis_sqlserver}
      SECRET_AGENT_TEST_MYSQL_DB_HOST: agent-test-mysql
      SECRET_AGENT_TEST_MYSQL_DB_USER: ${SECRET_AGENT_TEST_MYSQL_DB_USER:-agent_test_reader}
      SECRET_AGENT_TEST_MYSQL_DB_PASSWORD: ${SECRET_AGENT_TEST_MYSQL_DB_PASSWORD:-agent_test_reader_mysql}
      SECRET_AGENT_TEST_MYSQL_REDIS_HOST: agent-test-redis-mysql
      SECRET_AGENT_TEST_MYSQL_REDIS_USER: ${SECRET_AGENT_TEST_MYSQL_REDIS_USER:-agent_test_reader}
      SECRET_AGENT_TEST_MYSQL_REDIS_PASSWORD: ${SECRET_AGENT_TEST_MYSQL_REDIS_PASSWORD:-agent_test_reader_redis_mysql}
      SECRET_AGENT_TEST_SQLSERVER_DB_HOST: agent-test-sqlserver
      SECRET_AGENT_TEST_SQLSERVER_DB_USER: ${SECRET_AGENT_TEST_SQLSERVER_DB_USER:-agent_test_reader}
      SECRET_AGENT_TEST_SQLSERVER_DB_PASSWORD: ${SECRET_AGENT_TEST_SQLSERVER_DB_PASSWORD:-AgentTest_reader_sqlserver_2026}
      SECRET_AGENT_TEST_SQLSERVER_REDIS_HOST: agent-test-redis-sqlserver
      SECRET_AGENT_TEST_SQLSERVER_REDIS_USER: ${SECRET_AGENT_TEST_SQLSERVER_REDIS_USER:-agent_test_reader}
      SECRET_AGENT_TEST_SQLSERVER_REDIS_PASSWORD: ${SECRET_AGENT_TEST_SQLSERVER_REDIS_PASSWORD:-agent_test_reader_redis_sqlserver}
    depends_on:
      agent-test-mysql:
        condition: service_healthy
      agent-test-sqlserver:
        condition: service_healthy
      agent-test-redis-mysql:
        condition: service_healthy
      agent-test-redis-sqlserver:
        condition: service_healthy

  mock-internal-api-platform:
    profiles: ["mock-tools"]
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: mock-internal-api-platform
    command:
      ["python", "-m", "uvicorn", "app.mock_internal_api_platform:create_app", "--factory", "--host", "0.0.0.0", "--port", "9000"]
    expose:
      - "9000"

  local-internal-api-platform:
    profiles: ["local-tools"]
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      ["python", "-m", "uvicorn", "app.local_internal_api_platform:create_app", "--factory", "--host", "0.0.0.0", "--port", "9000"]
    environment:
      <<: *runtime-env
    expose:
      - "9000"

  # real-tools: 拓扑感知、多数据源、只读 Internal API Platform。
  internal-api-platform:
    profiles: ["real-tools"]
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: internal-api-platform
      args:
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-https://mirrors.aliyun.com/debian}
        DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-https://mirrors.aliyun.com/debian-security}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        HTTP_PROXY: ${HTTP_PROXY:-${http_proxy:-}}
        HTTPS_PROXY: ${HTTPS_PROXY:-${https_proxy:-}}
        no_proxy: ${no_proxy:-}
        NO_PROXY: ${NO_PROXY:-${no_proxy:-}}
    command:
      ["python", "-m", "uvicorn", "app.internal_api_platform:create_app", "--factory", "--host", "0.0.0.0", "--port", "9000"]
    environment:
      <<: *runtime-env
    volumes:
      - ./backend/config:/app/backend/config:ro
    expose:
      - "9000"
    depends_on:
      postgres:
        condition: service_healthy

  api-server:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: api-server
    command:
      ["python", "-m", "uvicorn", "app.main:create_app", "--factory", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      <<: *worker-env
      SEED_LOCAL_CONFIG: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  dingtalk-stream-ingress:
    profiles: ["dingtalk-stream"]
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dingtalk-stream-ingress
    command: ["python", "-m", "app.workers.dingtalk_stream_ingress_worker"]
    environment:
      <<: *worker-env
      SEED_LOCAL_CONFIG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  agent-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: agent-worker
    command: ["python", "-m", "app.workers.agent_job_worker"]
    environment:
      <<: *worker-env
      SEED_LOCAL_CONFIG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  agent-test-mysql-data:
    name: enterprise_agent_agent_test_mysql_data
  agent-test-sqlserver-data:
    name: enterprise_agent_agent_test_sqlserver_data
  agent-test-redis-mysql-data:
    name: enterprise_agent_agent_test_redis_mysql_data
  agent-test-redis-sqlserver-data:
    name: enterprise_agent_agent_test_redis_sqlserver_data
