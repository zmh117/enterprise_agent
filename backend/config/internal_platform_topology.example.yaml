# Internal API Platform topology (example / local real-tools).
#
# Secrets use `*_ref: secret://...` → env `SECRET_<UPPER_SNAKE_OF_PATH>`.
# Never inline real credentials in this file.
#
# Oracle: `database` = Easy Connect service name (SERVICE).
# Workshop codes = PLANT + workshop number (e.g. GL + 001 → GL001).

environments:
  # 三九：观澜 / 顺丰 / 郴州 × 云端 / 边端（Oracle + Redis Cluster）
  sanjiu:
    display_name: 三九
    aliases: [三九集团]
    bases:
      guanlan_cloud:
        display_name: 观澜云端
        aliases: [观澜云端, 观澜, guanlan]
        engine: oracle
        database:
          host_ref: secret://sanjiu/guanlan_cloud/db_host
          port: 1521
          database: CRMES
          schema: CRMES_TEST_CLOUD_GL
          user_ref: secret://sanjiu/guanlan_cloud/db_user
          password_ref: secret://sanjiu/guanlan_cloud/db_password
          oracle_client_mode: thick
          oracle_compat: legacy
          use_sid: false
        redis:
          mode: cluster
          password_ref: secret://sanjiu/cloud/redis_password
          nodes:
            - { host: 10.0.102.103, port: 6380 }
            - { host: 10.0.102.103, port: 6381 }
            - { host: 10.0.102.104, port: 6380 }
            - { host: 10.0.102.104, port: 6381 }
            - { host: 10.0.102.105, port: 6380 }
            - { host: 10.0.102.105, port: 6381 }
        workshops:
          GL001:
            display_name: 观澜云端一号车间
            table_prefix: GL001_EBR_
            redis_key_prefix: 'GL001:'
            loki_label: { workshop: GL001 }
          GL002:
            display_name: 观澜云端二号车间
            table_prefix: GL002_EBR_
            redis_key_prefix: 'GL002:'
            loki_label: { workshop: GL002 }
          GL003:
            display_name: 观澜云端三号车间
            table_prefix: GL003_EBR_
            redis_key_prefix: 'GL003:'
            loki_label: { workshop: GL003 }

      guanlan_edge:
